openapi: 3.1.0
info:
  title: Enscribe API
  version: 1.0.0
  description: API reference for authenticated Enscribe endpoints.
servers:
  - url: /
    description: Docs origin (proxied to dashboard.enscribe.xyz in production)
  - url: https://dashboard.enscribe.xyz
    description: Direct Enscribe host
tags:
  - name: Organizations
    description: Organization setup and configuration endpoints.
  - name: Invitations
    description: Organization invitation endpoints.
  - name: Members
    description: Organization membership management endpoints.
  - name: API keys
    description: Organization API key management endpoints.
  - name: Namespaces
    description: Namespace onboarding and configuration endpoints.
  - name: Contracts
    description: Contract inventory endpoints.
  - name: Activity
    description: Activity feed endpoints for org operations.
  - name: Metadata
    description: Metadata and staged subname execution endpoints.
  - name: Subnames
    description: Authenticated v2 subname endpoints for platform users and API keys.
paths:
  /api/orgs:
    post:
      tags:
        - Organizations
      operationId: createOrganization
      summary: Create an organization
      description: Creates an organization for the signed-in user and stores the corresponding platform record.
      security:
        - ClerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "200":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrganizationApiResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "409":
          description: Organization creation conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
  /api/orgs/{orgId}/config:
    get:
      tags:
        - Organizations
      operationId: getOrganizationConfig
      summary: Get organization config
      description: Returns the organization onboarding state and namespace summaries for the authenticated user.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      responses:
        "200":
          description: Organization config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationConfigResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/invitations:
    post:
      tags:
        - Invitations
      operationId: createOrganizationInvitation
      summary: Create an organization invitation
      description: Invites a member to the active organization. The caller must be an org admin.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationInvitationRequest"
      responses:
        "200":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationInvitationApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Admin role required or org mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
  /api/orgs/{orgId}/members/{membershipId}/role:
    patch:
      tags:
        - Members
      operationId: updateOrganizationMemberRole
      summary: Update an organization member role
      description: Updates a Clerk organization membership role and syncs the result into the platform database.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/MembershipIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationMemberRoleRequest"
      responses:
        "200":
          description: Membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMemberRoleApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Admin role required or org mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
  /api/orgs/{orgId}/api-keys:
    get:
      tags:
        - API keys
      operationId: listOrganizationApiKeys
      summary: List organization API keys
      description: Returns all API keys for the organization, or only the keys bound to a specific namespace when the optional filter is provided.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceIdQueryParam"
      responses:
        "200":
          description: API keys returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationApiKeyListApiResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Admin role required or org mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
    post:
      tags:
        - API keys
      operationId: createOrganizationApiKey
      summary: Create an organization API key
      description: Creates a new API key for the organization. Keys may be org-wide or bound to a single namespace.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationApiKeyRequest"
      responses:
        "200":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrganizationApiKeyApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Admin role required or org mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
  /api/orgs/{orgId}/api-keys/{keyId}/revoke:
    post:
      tags:
        - API keys
      operationId: revokeOrganizationApiKey
      summary: Revoke an organization API key
      description: Revokes an existing API key for the organization.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/KeyIdPathParam"
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationApiKeyApiResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Admin role required or org mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
  /api/orgs/{orgId}/namespaces:
    post:
      tags:
        - Namespaces
      operationId: createNamespace
      summary: Create a namespace
      description: Onboards an ENS name into the organization as a managed namespace.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNamespaceRequest"
      responses:
        "201":
          description: Namespace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNamespaceResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "409":
          description: Namespace already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/namespaces/{nsId}/config:
    get:
      tags:
        - Namespaces
      operationId: getNamespaceConfig
      summary: Get namespace config
      description: Returns the full stored configuration for a namespace.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceIdPathParam"
      responses:
        "200":
          description: Namespace returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "404":
          description: Namespace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/namespaces/{nsId}:
    delete:
      tags:
        - Namespaces
      operationId: deleteNamespace
      summary: Delete a namespace
      description: Deletes a namespace and its associated platform data.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceIdPathParam"
      responses:
        "200":
          description: Namespace deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/contracts:
    get:
      tags:
        - Contracts
      operationId: listContracts
      summary: List contracts
      description: Returns the organization's contract inventory, optionally filtered by namespace, naming status, or limit.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceIdQueryParam"
        - $ref: "#/components/parameters/NamingStatusQueryParam"
        - $ref: "#/components/parameters/LimitQueryParam"
      responses:
        "200":
          description: Contracts returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
    post:
      tags:
        - Contracts
      operationId: addContract
      summary: Add a contract
      description: Adds an address to the organization's inventory and detects the address type server-side.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddContractRequest"
      responses:
        "200":
          description: Contract added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "409":
          description: Duplicate address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/activity:
    get:
      tags:
        - Activity
      operationId: listOrganizationActivity
      summary: List organization activity
      description: Returns naming operations for the organization, optionally scoped to a namespace and limited to a maximum number of rows.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceIdQueryParam"
        - $ref: "#/components/parameters/LimitQueryParam"
      responses:
        "200":
          description: Activity returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamingOperation"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/orgs/{orgId}/metadata:
    post:
      tags:
        - Metadata
      operationId: executeMetadataChanges
      summary: Execute staged metadata changes
      description: Submits staged subname creations, subname deletions, and record updates for a namespace. The response reflects either direct execution or Safe proposal mode.
      security:
        - ClerkSession: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataExecuteRequest"
      responses:
        "200":
          description: All requested operations were accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataExecuteResponse"
        "207":
          description: Partial success or mixed outcome across phases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataExecuteResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "404":
          description: Organization or namespace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
  /api/v2/orgs/{orgId}/subnames:
    get:
      tags:
        - Subnames
      operationId: listSubnames
      summary: List subnames
      description: Returns all subnames under the resolved namespace. Namespace selection can come from an API key binding, a namespace query parameter, or the `x-enscribe-namespace` header.
      security:
        - ClerkSession: []
        - BearerApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceSelectorQueryParam"
        - $ref: "#/components/parameters/NamespaceSelectorHeaderParam"
      responses:
        "200":
          description: Subnames returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubnameListApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Missing scope or namespace access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
    post:
      tags:
        - Subnames
      operationId: createSubname
      summary: Create a subname
      description: Creates a subname under the resolved namespace. In Safe mode this returns a proposed Safe transaction; in direct mode this returns a confirmed transaction hash.
      security:
        - ClerkSession: []
        - BearerApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceSelectorQueryParam"
        - $ref: "#/components/parameters/NamespaceSelectorHeaderParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubnameRequest"
      responses:
        "200":
          description: Subname creation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubnameCreateApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Missing scope or namespace access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "503":
          description: Enscribe signer has insufficient gas balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
    delete:
      tags:
        - Subnames
      operationId: deleteSubname
      summary: Delete a subname
      description: Deletes a subname under the resolved namespace. In Safe mode this returns a proposed Safe transaction; in direct mode this returns a confirmed transaction hash.
      security:
        - ClerkSession: []
        - BearerApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIdPathParam"
        - $ref: "#/components/parameters/NamespaceSelectorQueryParam"
        - $ref: "#/components/parameters/NamespaceSelectorHeaderParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteSubnameRequest"
      responses:
        "200":
          description: Subname deletion accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubnameDeleteApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "403":
          description: Missing scope or namespace access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeErrorResponse"
components:
  securitySchemes:
    ClerkSession:
      type: apiKey
      in: cookie
      name: __session
      description: Clerk session cookie for authenticated platform users.
    BearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Clerk API key secret created from organization settings.
  parameters:
    OrgIdPathParam:
      name: orgId
      in: path
      required: true
      description: Clerk organization ID.
      schema:
        type: string
      example: org_2xYk0mNQ7zT2n
    MembershipIdPathParam:
      name: membershipId
      in: path
      required: true
      description: Clerk membership ID.
      schema:
        type: string
      example: orgmem_2nP8wK4s9hA
    KeyIdPathParam:
      name: keyId
      in: path
      required: true
      description: Clerk API key ID.
      schema:
        type: string
      example: key_2rG4n5m8QwZ
    NamespaceIdPathParam:
      name: nsId
      in: path
      required: true
      description: Namespace ID.
      schema:
        type: string
        format: uuid
      example: 2df5d8f7-c2a0-4b50-a5da-66a428c9a1d4
    NamespaceIdQueryParam:
      name: namespace
      in: query
      required: false
      description: Namespace ID filter.
      schema:
        type: string
        format: uuid
      example: 2df5d8f7-c2a0-4b50-a5da-66a428c9a1d4
    NamespaceSelectorQueryParam:
      name: namespace
      in: query
      required: false
      description: Namespace slug or namespace ID.
      schema:
        type: string
      example: app-enscribe-eth-mainnet
    NamespaceSelectorHeaderParam:
      name: x-enscribe-namespace
      in: header
      required: false
      description: Namespace slug or namespace ID, supplied as a request header.
      schema:
        type: string
      example: app-enscribe-eth-mainnet
    NamingStatusQueryParam:
      name: naming_status
      in: query
      required: false
      description: Comma-separated naming status filter.
      schema:
        type: string
      example: unnamed,failed
    LimitQueryParam:
      name: limit
      in: query
      required: false
      description: Maximum number of rows to return.
      schema:
        type: integer
        minimum: 1
      example: 25
  schemas:
    ApiErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - VALIDATION_ERROR
            - CONFLICT
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
    ApiEnvelopeErrorResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - error
      properties:
        data:
          type: "null"
        error:
          $ref: "#/components/schemas/ApiErrorObject"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    LegacyErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        cursor:
          type: string
        hasMore:
          type: boolean
    NetworkMode:
      type: string
      enum:
        - mainnet
        - testnet
    ManagerMode:
      type: string
      enum:
        - enscribe_only
        - safe_multisig
        - enscribe_smart_session
    ContractType:
      type: string
      enum:
        - contract
        - wallet
        - safe_wallet
    ContractStatus:
      type: string
      enum:
        - pending
        - named
        - failed
    NamingStatus:
      type: string
      enum:
        - unnamed
        - pending
        - named
        - failed
    MetadataStatus:
      type: string
      enum:
        - none
        - partial
        - complete
    OperationType:
      type: string
      enum:
        - assign
        - batch
        - delegate
        - revoke
        - metadata_change
        - manager_transfer
        - multisig_sign
        - subname_create
        - subname_delete
    OperationStatus:
      type: string
      enum:
        - pending
        - submitted
        - confirmed
        - failed
        - cancelled
    ApiScope:
